name: build-and-push

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/jannikseus/portfolio

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Read package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          MAJOR=$(printf '%s' "$VERSION" | cut -d. -f1)
          MINOR=$(printf '%s' "$VERSION" | cut -d. -f2)
          SHORT_SHA=$(printf '%s' "$GITHUB_SHA" | cut -c1-7)

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.version.outputs.value }}
            type=raw,value=v${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
            type=raw,value=v${{ steps.version.outputs.major }}
            type=raw,value=v${{ steps.version.outputs.value }}-sha.${{ steps.version.outputs.short_sha }}
            type=sha,format=long

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
