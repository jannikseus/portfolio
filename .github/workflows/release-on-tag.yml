name: release-on-tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/jannikseus/portfolio

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tag
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate tag matches package version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -p "require('./package.json').version")"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vX.Y.Z format. Got: $TAG"
            exit 1
          fi

          if [ "v${VERSION}" != "$TAG" ]; then
            echo "Tag/version mismatch: tag is ${TAG}, package.json version is ${VERSION}"
            exit 1
          fi

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,format=long

      - name: Build and push release image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Check out main branch
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Update changelog from release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"

          if [ -f CHANGELOG.md ] && grep -q "^## \[${VERSION}\] - " CHANGELOG.md; then
            echo "CHANGELOG already has ${VERSION}; skipping update"
            exit 0
          fi

          NOTES="$(gh release view "${GITHUB_REF_NAME}" --json body --jq .body)"
          DATE="$(date -u +%Y-%m-%d)"

          if [ -f CHANGELOG.md ]; then
            BODY="$(tail -n +8 CHANGELOG.md)"
          else
            BODY=""
          fi

          {
            echo "# Changelog"
            echo
            echo "All notable changes to this project are documented in this file."
            echo
            echo "The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),"
            echo "and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html)."
            echo
            echo "## [Unreleased]"
            echo
            echo "## [${VERSION}] - ${DATE}"
            echo
            echo "### Changed"
            echo
            echo "${NOTES}"
            echo
            echo "${BODY}"
          } > CHANGELOG.md

      - name: Commit changelog update
        run: |
          set -euo pipefail
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update changelog for ${GITHUB_REF_NAME}"
          git push origin main

